name: gymos_ai
description: "GymOS — AI-powered gym management SaaS platform"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2

  # Supabase
  supabase_flutter: ^2.8.4

  # State Management - FIXED: Downgraded for StateNotifier compatibility
  flutter_riverpod: ^2.6.1  # DOWNGRADED from ^3.3.1 - StateNotifier fully supported
  state_notifier: ^1.0.0

  # Routing
  go_router: ^17.1.0

  # Google font
  google_fonts: ^8.0.2

  # Environment Variables
  flutter_dotenv: ^6.0.0

  # Animations
  flutter_animate: ^4.5.2

  # Persistence
  shared_preferences: ^2.3.3

  # Utilities
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  url_launcher: ^6.3.1
  http: ^1.2.2
  fl_chart: ^1.2.0
  freezed_annotation: ^2.4.4

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

  # ── NEW FEATURES ──────────────────────────────────────────
  # Local push notifications (membership expiry, workout reminders)
  flutter_local_notifications: ^21.0.0
  # Timezone support for scheduled notifications
  timezone: ^0.11.0

  # Device connectivity detection (offline mode)
  connectivity_plus: ^7.0.0

  # Enhanced calendar widget for workout scheduling
  table_calendar: ^3.1.3

  # Circular/linear percentage progress indicators
  percent_indicator: ^4.2.3

  # Lottie animations (achievement unlock, empty states)
  lottie: ^3.1.2

  # Image picker (profile photo, progress photos)
  image_picker: ^1.1.2

  # Runtime permission requests (camera, notifications)
  permission_handler: ^12.0.1

  # Mobile barcode / QR scanner (food & gym check-in)
  mobile_scanner: ^7.2.0

  # Biometric authentication (fingerprint / Face ID)
  local_auth: ^3.0.1

  # Google Sign-In
  google_sign_in: ^6.2.1
  sentry_flutter: ^9.15.0
  flutter_cashfree_pg_sdk: ^2.2.10+48

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  freezed: ^2.5.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/app.env
    - assets/images/
    - assets/icon/app_icon.png

# App Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#030712"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

# Splash Screen Configuration
flutter_native_splash:
  color: "#030712"
  image: assets/icon/app_icon.png
  image_dark: assets/icon/app_icon.png
  color_dark: "#030712"
  android: true
  ios: true
  web: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true










