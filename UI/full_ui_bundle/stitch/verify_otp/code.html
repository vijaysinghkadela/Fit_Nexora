<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#895af6",
                        "background-light": "#f6f5f8",
                        "background-dark": "#151022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(137, 90, 246, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(137, 90, 246, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen flex flex-col overflow-hidden">
<div class="relative flex h-full w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark p-6 overflow-y-auto">
<!-- Header / Back Button -->
<div class="flex items-center justify-between mb-8">
<button class="flex size-10 items-center justify-center rounded-full bg-slate-200/50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="w-10"></div> <!-- Spacer for centering title if needed -->
</div>
<!-- Hero Section -->
<div class="mb-10">
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-bold leading-tight tracking-tight mb-3">
                Verify Code
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                We've sent a 4-digit code to your email <span class="text-primary font-medium">alex.rivers@fitnexora.io</span>
</p>
</div>
<!-- OTP Input Area -->
<div class="flex flex-col gap-8 mb-10">
<div class="flex justify-between gap-4">
<input class="w-16 h-20 text-center text-3xl font-bold rounded-xl glass-panel border-slate-700 focus:border-primary focus:ring-2 focus:ring-primary/50 dark:text-white transition-all outline-none" maxlength="1" placeholder="-" type="text" value="5"/>
<input class="w-16 h-20 text-center text-3xl font-bold rounded-xl glass-panel border-slate-700 focus:border-primary focus:ring-2 focus:ring-primary/50 dark:text-white transition-all outline-none" maxlength="1" placeholder="-" type="text" value="8"/>
<input autofocus="" class="w-16 h-20 text-center text-3xl font-bold rounded-xl glass-panel border-primary border-2 ring-2 ring-primary/30 dark:text-white transition-all outline-none" maxlength="1" placeholder="-" type="text"/>
<input class="w-16 h-20 text-center text-3xl font-bold rounded-xl glass-panel border-slate-700 focus:border-primary focus:ring-2 focus:ring-primary/50 dark:text-white transition-all outline-none" maxlength="1" placeholder="-" type="text"/>
</div>
<!-- Resend Link -->
<div class="flex flex-col items-center gap-2">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                    Didn't receive the code?
                </p>
<button class="text-primary font-semibold hover:underline flex items-center gap-2">
                    Resend Code <span class="text-slate-400 font-normal text-xs bg-slate-800 px-2 py-1 rounded-full">00:55</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="mt-auto pt-6">
<button class="w-full flex items-center justify-center rounded-xl h-14 px-5 bg-gradient-to-r from-primary to-[#a881ff] glow-button text-white text-lg font-bold tracking-wide transition-transform active:scale-[0.98]">
                Verify &amp; Proceed
            </button>
</div>
<!-- Branding -->
<div class="flex flex-col items-center justify-center mt-12 opacity-40">
<div class="flex items-center gap-2 mb-1">
<div class="size-6 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm">bolt</span>
</div>
<span class="font-bold tracking-tighter text-slate-900 dark:text-slate-100">FitNexora</span>
</div>
<p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Premium Fitness Ecosystem</p>
</div>
</div>
<!-- Decorative Elements -->
<div class="fixed top-[-10%] right-[-10%] w-[300px] h-[300px] bg-primary/20 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[250px] h-[250px] bg-primary/10 rounded-full blur-[80px] -z-10"></div>
</body></html>
