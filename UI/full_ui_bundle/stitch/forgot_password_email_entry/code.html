<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", // Emerald/Mint accent as requested
                        "accent-violet": "#895af6",
                        "background-light": "#f6f5f8",
                        "background-dark": "#0f0a1e", // Deep violet background
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bg-gradient-mesh {
            background-color: #0f0a1e;
            background-image: 
                radial-gradient(at 0% 0%, rgba(137, 90, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center bg-gradient-mesh p-4 overflow-x-hidden">
<!-- Back Button -->
<div class="absolute top-8 left-8">
<button class="flex items-center justify-center size-10 rounded-full bg-white/5 border border-white/10 text-slate-100 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<!-- Glassmorphic Card Container -->
<div class="glass-card w-full max-w-md rounded-xl p-8 md:p-10 shadow-2xl">
<!-- Branding/Logo Placeholder -->
<div class="flex justify-center mb-8">
<div class="size-14 rounded-xl bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">lock_reset</span>
</div>
</div>
<!-- Header Section -->
<div class="text-center mb-10">
<h1 class="text-slate-100 text-3xl font-bold tracking-tight mb-3">Forgot Password</h1>
<p class="text-slate-400 text-base leading-relaxed">
                    Enter your email address and we'll send you a link to reset your password.
                </p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-300 text-sm font-medium ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full rounded-xl bg-white/5 border border-white/10 py-4 pl-12 pr-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-base" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-emerald-500 text-slate-950 font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">send</span>
</button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center">
<p class="text-slate-500 text-sm">
                    Remember your password? 
                    <a class="text-primary hover:underline font-semibold ml-1" href="#">Log in</a>
</p>
</div>
</div>
<!-- Decorative elements -->
<div class="fixed top-[-10%] right-[-5%] size-96 bg-accent-violet/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-5%] size-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
</div>
</body></html>
