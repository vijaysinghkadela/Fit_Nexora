<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitNexora - Transformation Starts Here</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#7c3aed",
              "primary-dark": "#6d28d9",
              "background-light": "#ffffff",
              "background-accent": "#fdfcff",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body {
        min-height: max(884px, 100dvh);
      }
      .gradient-bg {
        background: radial-gradient(circle at top right, rgba(124, 58, 237, 0.05), transparent),
                    radial-gradient(circle at bottom left, rgba(124, 58, 237, 0.03), transparent);
      }
    </style>
</head>
<body class="bg-background-light font-display text-slate-900 antialiased gradient-bg">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Hero Section with Background -->
<div class="relative h-[40vh] w-full @container">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Athletic person training in a bright modern gym environment" style='background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 1)), url("https://lh3.googleusercontent.com/aida-public/AB6AXuAHu68_y7RYIIdtqDXLxfJBvvpyyGgUrhYZ4-kea7MKXS2FPcCQP9c-OLrtUlKkKxpOSOGM5dnSr_r2XlUnZfMe1p3wMrsHANDxObXiJxZdWbnCPM3TghJAi3oTDBjemc7NB8wlvdT8fz0eseMz6sJvrzePvYboGvyXE1j_lRbjAwpgtrpbqpelauB_UaI4Sp1JtizVkIV4XZH1YM3uAYtK4XWQ69aHSAVklmy3_77inIhYWXg9JcyLvFwSzxwcTyfvWz2Rf0skdHI");'>
</div>
<!-- Top App Bar Navigation -->
<div class="relative z-10 flex items-center p-6 justify-between">
<div class="text-slate-700 flex size-10 shrink-0 items-center justify-center rounded-full bg-white/60 backdrop-blur-md border border-white/20 shadow-sm">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<div class="text-slate-700 flex size-10 shrink-0 items-center justify-center rounded-full bg-white/60 backdrop-blur-md border border-white/20 shadow-sm">
<span class="material-symbols-outlined">help_outline</span>
</div>
</div>
<!-- Branding Logo Overlay -->
<div class="absolute bottom-4 left-0 right-0 px-6">
<div class="flex flex-col items-center">
<div class="mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-primary shadow-xl shadow-primary/30">
<span class="material-symbols-outlined text-4xl text-white">bolt</span>
</div>
<h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Fit<span class="text-primary">Nexora</span></h1>
</div>
</div>
</div>
<!-- Content Area -->
<div class="flex flex-1 flex-col px-6 pb-10 pt-6">
<div class="mb-8 text-center">
<h2 class="text-3xl font-bold tracking-tight text-slate-900">Welcome Back</h2>
<p class="mt-2 text-slate-500">Log in to continue your fitness journey</p>
</div>
<!-- Login Form -->
<div class="space-y-5">
<div class="group relative">
<label class="mb-1.5 ml-1 block text-sm font-semibold text-slate-700">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full rounded-xl border border-slate-200 bg-white py-4 pl-12 pr-4 text-slate-900 shadow-sm transition-all focus:border-primary focus:ring-4 focus:ring-primary/10" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="group relative">
<label class="mb-1.5 ml-1 block text-sm font-semibold text-slate-700">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full rounded-xl border border-slate-200 bg-white py-4 pl-12 pr-12 text-slate-900 shadow-sm transition-all focus:border-primary focus:ring-4 focus:ring-primary/10" placeholder="Enter your password" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer hover:text-slate-600 transition-colors">visibility</span>
</div>
</div>
<div class="flex items-center justify-end px-1">
<a class="text-sm font-semibold text-primary hover:text-primary-dark transition-colors" href="#">Forgot password?</a>
</div>
<button class="w-full rounded-xl bg-primary py-4 font-bold text-white shadow-lg shadow-primary/30 transition-all hover:bg-primary-dark hover:shadow-primary/40 active:scale-[0.98]">
                    Sign In
                </button>
</div>
<!-- Divider -->
<div class="my-8 flex items-center gap-4">
<div class="h-px flex-1 bg-slate-200"></div>
<span class="text-xs font-bold uppercase tracking-widest text-slate-400">OR</span>
<div class="h-px flex-1 bg-slate-200"></div>
</div>
<!-- Biometric & Social -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white py-3.5 text-sm font-semibold text-slate-700 shadow-sm transition-all hover:bg-slate-50 active:scale-95">
<span class="material-symbols-outlined text-primary text-[20px]">fingerprint</span>
                    Biometric
                </button>
<button class="flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white py-3.5 text-sm font-semibold text-slate-700 shadow-sm transition-all hover:bg-slate-50 active:scale-95">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGR7lt4U6aNP6gYFLE8i8t0rGT-LmNEoW9urevu_4RgAZYdWXQrERjaquramH_OnoILTm72x-5_jOmzMFYoijf5u9vpu9ZTRAuzF_KbNBIf1Ax8jiqSAG7i_vllE-FnPK7D5rU6i2wKvR0mJw3lILsXhhM5v1s_5u3TYTPFS3E57mBM3H1kBj2-oBM6S8Qzzr7DzCNGDR-soWrstbV7wQ68BCWXxHAtZMeyt5dHyGn6FqjqdngAvv3n-48L-oPIhOJL8MHXgRf8eY"/>
                    Google
                </button>
</div>
<!-- Onboarding CTA -->
<div class="mt-auto pt-10 text-center">
<p class="text-slate-600">
                    New here? 
                    <a class="ml-1 font-bold text-primary hover:text-primary-dark transition-colors decoration-primary/30 underline-offset-4 underline decoration-2" href="#">Start your transformation</a>
</p>
</div>
</div>
<!-- Footer Blur Effect -->
<div class="fixed bottom-0 left-0 right-0 h-6 bg-gradient-to-t from-white pointer-events-none"></div>
</div>
</body></html>
