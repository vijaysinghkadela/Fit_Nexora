<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8b5cf6", // Vibrant Violet
                        "secondary": "#10b981", // Emerald
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(139, 92, 246, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Navigation -->
<div class="sticky top-0 z-50 flex items-center bg-white/80 backdrop-blur-md p-4 justify-between border-b border-slate-100">
<div class="flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-slate-100 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-600">arrow_back</span>
</div>
<h2 class="text-slate-800 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Manual Nutrition Log</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex items-center justify-center rounded-full size-10 hover:bg-slate-100 transition-colors">
<span class="material-symbols-outlined text-slate-600">more_horiz</span>
</button>
</div>
</div>
<main class="max-w-xl mx-auto w-full p-4 space-y-6">
<!-- Section Header -->
<div class="pt-2">
<h3 class="text-slate-900 text-xl font-bold tracking-tight">General Information</h3>
<p class="text-slate-500 text-sm mt-1">Details about your meal intake</p>
</div>
<!-- Form Content -->
<div class="glass-card rounded-2xl p-6 space-y-6">
<!-- Meal Name Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 text-sm font-semibold ml-1">Meal Name</label>
<div class="relative group">
<input class="form-input flex w-full rounded-xl border-slate-200 bg-white/50 focus:border-primary focus:ring-4 focus:ring-primary/10 h-14 placeholder:text-slate-400 p-4 text-base transition-all" placeholder="e.g. Grilled Chicken Salad" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-slate-300 group-focus-within:text-primary transition-colors">restaurant</span>
</div>
</div>
<!-- Meal Type Select -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 text-sm font-semibold ml-1">Meal Type</label>
<div class="relative">
<select class="form-select flex w-full rounded-xl border-slate-200 bg-white/50 focus:border-primary focus:ring-4 focus:ring-primary/10 h-14 p-4 text-base appearance-none transition-all">
<option disabled="" selected="" value="">Select category</option>
<option value="breakfast">Breakfast</option>
<option value="lunch">Lunch</option>
<option value="dinner">Dinner</option>
<option value="snack">Snack</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 text-slate-400 pointer-events-none">unfold_more</span>
</div>
</div>
<!-- Calendar Section -->
<div class="flex flex-col gap-3 pt-2">
<div class="flex items-center justify-between mb-2">
<label class="text-slate-700 text-sm font-semibold ml-1">Log Date</label>
<span class="text-primary text-xs font-bold bg-primary/10 px-2 py-1 rounded-full">Today</span>
</div>
<div class="bg-slate-50/50 rounded-2xl p-4 border border-slate-100">
<div class="flex items-center justify-between mb-4">
<button class="p-2 hover:bg-white rounded-lg transition-colors border border-transparent hover:border-slate-100">
<span class="material-symbols-outlined text-slate-600">chevron_left</span>
</button>
<p class="text-slate-800 font-bold">October 2023</p>
<button class="p-2 hover:bg-white rounded-lg transition-colors border border-transparent hover:border-slate-100">
<span class="material-symbols-outlined text-slate-600">chevron_right</span>
</button>
</div>
<div class="grid grid-cols-7 text-center">
<span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider pb-3">S</span>
<span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider pb-3">M</span>
<span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider pb-3">T</span>
<span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider pb-3">W</span>
<span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider pb-3">T</span>
<span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider pb-3">F</span>
<span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider pb-3">S</span>
<!-- Empty spaces for calendar start -->
<div class="h-10"></div><div class="h-10"></div><div class="h-10"></div>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">1</button>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">2</button>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">3</button>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">4</button>
<button class="h-10 flex items-center justify-center text-sm font-bold bg-primary text-white rounded-full shadow-lg shadow-primary/30 ring-4 ring-primary/10">5</button>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">6</button>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">7</button>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">8</button>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">9</button>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">10</button>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">11</button>
<button class="h-10 flex items-center justify-center text-sm font-medium hover:bg-white rounded-full transition-all">12</button>
</div>
</div>
</div>
</div>
<!-- Nutrient Stats -->
<div class="grid grid-cols-2 gap-4">
<div class="glass-card rounded-2xl p-4 flex flex-col gap-1">
<p class="text-slate-500 text-xs font-semibold uppercase tracking-wider">Calories</p>
<div class="flex items-end gap-1">
<span class="text-2xl font-bold text-slate-800">450</span>
<span class="text-slate-400 text-sm mb-1">kcal</span>
</div>
<div class="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden">
<div class="bg-secondary h-full w-[65%]" data-alt="65 percent progress bar"></div>
</div>
</div>
<div class="glass-card rounded-2xl p-4 flex flex-col gap-1">
<p class="text-slate-500 text-xs font-semibold uppercase tracking-wider">Protein</p>
<div class="flex items-end gap-1">
<span class="text-2xl font-bold text-slate-800">32</span>
<span class="text-slate-400 text-sm mb-1">g</span>
</div>
<div class="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden">
<div class="bg-primary h-full w-[40%]" data-alt="40 percent progress bar"></div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 py-6">
<button class="w-full h-14 bg-secondary text-white rounded-xl font-bold text-lg shadow-xl shadow-secondary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                    Save Nutrition Log
                </button>
<button class="w-full h-14 bg-white border-2 border-slate-100 text-slate-600 rounded-xl font-bold text-lg hover:bg-slate-50 transition-all">
                    Cancel
                </button>
</div>
</main>
<!-- Bottom Tab Bar Placeholder -->
<div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-100 h-20 px-8 flex items-center justify-between z-50">
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold">Home</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">analytics</span>
<span class="text-[10px] font-bold">Stats</span>
</div>
<div class="relative -top-6">
<div class="bg-primary size-14 rounded-full flex items-center justify-center text-white shadow-xl shadow-primary/30 ring-8 ring-background-light">
<span class="material-symbols-outlined text-3xl">add</span>
</div>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">restaurant</span>
<span class="text-[10px] font-bold">Meals</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold">Profile</span>
</div>
</div>
<div class="h-24"></div> <!-- Spacer for fixed nav -->
</div>
</body></html>
