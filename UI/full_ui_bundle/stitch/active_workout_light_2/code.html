<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitNexora - Active Workout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#895af6",
                        "accent": "#10b981", /* Emerald/Mint Accent */
                        "background-light": "#ffffff",
                        "background-dark": "#0f0a1e",
                        "card-bg": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(137, 90, 246, 0.1), 0 8px 10px -6px rgba(137, 90, 246, 0.1);
            border: 1px solid rgba(137, 90, 246, 0.1);
        }
        .timer-glow {
            text-shadow: 0 0 20px rgba(137, 90, 246, 0.2);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light font-display text-slate-900 min-h-screen flex flex-col">
<header class="flex items-center justify-between px-6 pt-8 pb-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-900 border border-slate-200">
<span class="material-symbols-outlined">close</span>
</button>
<div class="text-center">
<h1 class="text-primary font-extrabold text-xl tracking-tight">FitNexora</h1>
<p class="text-[10px] uppercase tracking-[0.2em] opacity-60 text-slate-500">Push Your Limits</p>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-900 border border-slate-200">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="flex-1 px-6 pb-32">
<div class="flex flex-col items-center justify-center py-8">
<div class="flex items-baseline gap-2">
<span class="text-6xl font-black tracking-tighter text-slate-900 timer-glow">42:18</span>
<span class="text-accent font-bold animate-pulse text-sm">LIVE</span>
</div>
<p class="text-slate-500 text-sm font-medium mt-2">Total Session Time</p>
</div>
<!-- Exercise Focus Section -->
<div class="glass-card rounded-xl overflow-hidden mb-6 ring-2 ring-primary/5">
<div class="relative h-56 w-full">
<div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent z-10"></div>
<img alt="Athlete performing bench press" class="w-full h-full object-cover" data-alt="Close up of person doing bench press workout" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4jkxbingxt70ApvlOWrwRp2GSZ1J9xuFdIAa6DFtd-kbaKRpI3uK7PpYkVHwNItJ56zX9uQr1aFV3OI6iAJW1-rF7InptgMVwMWePqbJhLbBvNJDsM_34GS_DNhRnFyobBjXzQ-UhQhArJMSjzzCjkqTebYF55NT1Dk9bWJD-IjPdao2LCh9muMMNvbvQZnjoDssYf-2FowkVIPHcA4fdTX_E-4vPXa3z20kuH9KfGAFC13JfzEMDqwjan7FjDreZEhvB0FRxbnM"/>
<div class="absolute bottom-5 left-5 z-20">
<span class="bg-accent text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-2 inline-block shadow-lg shadow-accent/20">Chest &amp; Triceps</span>
<h2 class="text-2xl font-black text-white drop-shadow-md">Barbell Bench Press</h2>
</div>
</div>
</div>
<div class="glass-card rounded-xl p-6 mb-6">
<div class="flex justify-between items-center mb-6">
<div>
<p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Progress</p>
<h3 class="text-xl font-bold text-slate-900">Set <span class="text-primary">2</span> of 4</h3>
</div>
<div class="flex gap-1.5">
<div class="w-2.5 h-8 rounded-full bg-primary shadow-sm shadow-primary/30"></div>
<div class="w-2.5 h-8 rounded-full bg-slate-100"></div>
<div class="w-2.5 h-8 rounded-full bg-slate-100"></div>
<div class="w-2.5 h-8 rounded-full bg-slate-100"></div>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-xs font-bold text-slate-500 ml-1 uppercase tracking-wide">Weight (kg)</label>
<div class="flex items-center bg-slate-50 rounded-xl px-4 py-4 border-2 border-slate-100 focus-within:border-primary/30 transition-colors">
<input class="bg-transparent border-none p-0 focus:ring-0 text-3xl font-black w-full text-slate-900" type="number" value="85"/>
<span class="text-primary material-symbols-outlined font-bold">edit</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-xs font-bold text-slate-500 ml-1 uppercase tracking-wide">Reps</label>
<div class="flex items-center bg-slate-50 rounded-xl px-4 py-4 border-2 border-slate-100 focus-within:border-primary/30 transition-colors">
<input class="bg-transparent border-none p-0 focus:ring-0 text-3xl font-black w-full text-slate-900" type="number" value="10"/>
<span class="text-primary material-symbols-outlined font-bold">add</span>
</div>
</div>
</div>
</div>
<div class="flex flex-col gap-4">
<button class="w-full bg-accent hover:bg-emerald-500 text-white font-black py-5 rounded-xl flex items-center justify-center gap-3 shadow-xl shadow-accent/20 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">timer</span>
                START REST (01:30)
            </button>
<div class="grid grid-cols-2 gap-4">
<button class="bg-primary/10 text-primary hover:bg-primary/20 font-bold py-4 rounded-xl border border-primary/20 flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined">skip_next</span>
                    NEXT
                </button>
<button class="bg-slate-100 text-slate-900 hover:bg-slate-200 font-bold py-4 rounded-xl border border-slate-200 flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined">check_circle</span>
                    FINISH
                </button>
</div>
</div>
</main>
<nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 px-6 py-4 z-50">
<div class="max-w-md mx-auto flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">fitness_center</span>
<span class="text-[10px] font-bold">WORKOUT</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-medium">HISTORY</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">emoji_events</span>
<span class="text-[10px] font-medium">GOALS</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">PROFILE</span>
</a>
</div>
</nav>
<!-- Decorative gradients adjusted for light mode -->
<div class="fixed top-1/4 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-1/4 -right-20 w-64 h-64 bg-accent/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
