<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#895af6",
                        "accent": "#10b981", // Emerald Green
                        "background-light": "#f6f5f8",
                        "background-dark": "#0a0812",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-bg {
            background: radial-gradient(circle at top right, rgba(137, 90, 246, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden gradient-bg">
<!-- Top Navigation -->
<div class="flex items-center p-6 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-sm">bolt</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight">FitNexora</h2>
</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<div class="px-6 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-bold leading-tight tracking-tight">
                Get <span class="text-primary">Started</span>
</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal mt-3 max-w-[280px]">
                Experience the next generation of AI-powered fitness training.
            </p>
</div>
<!-- Registration Form -->
<div class="flex flex-col gap-5 px-6 pb-12 mt-4">
<!-- Role Selection -->
<div class="flex flex-col gap-3">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider opacity-60 ml-1">Account Type</p>
<div class="grid grid-cols-2 gap-4">
<label class="relative cursor-pointer">
<input checked="" class="peer hidden" name="role" type="radio"/>
<div class="flex flex-col items-center gap-2 p-4 rounded-xl glass border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 transition-all">
<span class="material-symbols-outlined text-primary">person</span>
<span class="text-sm font-medium">Member</span>
</div>
</label>
<label class="relative cursor-pointer">
<input class="peer hidden" name="role" type="radio"/>
<div class="flex flex-col items-center gap-2 p-4 rounded-xl glass border-2 border-transparent peer-checked:border-accent peer-checked:bg-accent/5 transition-all">
<span class="material-symbols-outlined text-accent">fitness_center</span>
<span class="text-sm font-medium">Gym Owner</span>
</div>
</label>
</div>
</div>
<!-- Inputs -->
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium ml-1">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-12 pr-4 h-14 rounded-xl border-slate-200 dark:border-slate-800 bg-white/5 dark:bg-white/5 focus:border-primary focus:ring-1 focus:ring-primary transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-500" placeholder="John Doe" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 h-14 rounded-xl border-slate-200 dark:border-slate-800 bg-white/5 dark:bg-white/5 focus:border-primary focus:ring-1 focus:ring-primary transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-500" placeholder="hello@fitnexora.ai" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium ml-1">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 h-14 rounded-xl border-slate-200 dark:border-slate-800 bg-white/5 dark:bg-white/5 focus:border-primary focus:ring-1 focus:ring-primary transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-500" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-center gap-3 px-1">
<input class="w-5 h-5 rounded border-slate-800 bg-white/5 text-primary focus:ring-primary" type="checkbox"/>
<p class="text-xs text-slate-500 leading-relaxed">
                    I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>
</p>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-4">
<span>Create Account</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Social Signup Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-slate-800"></div>
<span class="flex-shrink mx-4 text-xs text-slate-500 font-medium uppercase tracking-widest">Or join with</span>
<div class="flex-grow border-t border-slate-800"></div>
</div>
<!-- Social Icons -->
<div class="flex gap-4">
<button class="flex-1 h-14 rounded-xl glass flex items-center justify-center hover:bg-white/10 transition-all">
<img alt="Google" class="w-6 h-6" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCHvzDa5hl9BGFjrd1Ucr5Mh5zCfje25leLt2tyeJSZVPc2Ep8L24M9jmslE4WLlwuDUR8tYu6p7zIisTyYz0ZYTGHOtA0XG3eP85QBGXAyekjne_PquNWPtqmi8W6ANdYfr__ouP8uIFlAzZsulWCxbgTbNj9KUa6aPPzFXI9lVz7KBIG1Iwk_ezMUL0G3zvKgi2yHuKTzVGBki9SyvtN-ls_PBqob1zlPZgsw_HIpUxNtWTumXmdNyHppmwPa7W-uDBma6Dqr5I"/>
</button>
<button class="flex-1 h-14 rounded-xl glass flex items-center justify-center hover:bg-white/10 transition-all">
<span class="material-symbols-outlined text-2xl">ios</span>
</button>
</div>
<!-- Login Link -->
<p class="text-center text-slate-500 text-sm mt-6">
                Already have an account? 
                <a class="text-primary font-bold ml-1 hover:underline" href="#">Log in</a>
</p>
</div>
<!-- Decorative Floating Elements -->
<div class="absolute -bottom-10 -right-10 w-40 h-40 bg-accent/20 blur-[80px] rounded-full pointer-events-none"></div>
<div class="absolute top-1/4 -left-10 w-32 h-32 bg-primary/20 blur-[60px] rounded-full pointer-events-none"></div>
</div>
</body></html>
